<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blooktuber Leaderboard</title>

<style>
/* Import Nunito for numbers/subtitles and Titan One for Titles/Names */
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Titan+One&display=swap');

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Nunito', sans-serif;
}

body{
    background: #0bc2cf;
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: 40px;
}

/* Checkerboard */
body::before{
    content: "";
    position: fixed;
    inset: 0;
    background:
    linear-gradient(45deg,
    rgba(255,255,255,.08) 25%,
    transparent 25%,
    transparent 75%,
    rgba(255,255,255,.08) 75%);
    background-size: 80px 80px;
    z-index: -2;
}

/* Falling blooks */
.blook{
    position: fixed;
    top: -150px; /* Starts above the screen */
    opacity: .25;
    animation: fall linear infinite;
    pointer-events: none;
    z-index: -1; /* Keeps them behind the main content */
}

/* The falling animation */
@keyframes fall{
    from{ transform: translateY(0) rotate(0deg); }
    to{ transform: translateY(120vh) rotate(360deg); } /* Falls past the bottom */
}

h1{
    text-align: center;
    color: white;
    font-family: 'Titan One', cursive; 
    font-size: 3.5rem;
    margin-top: 25px;
    text-shadow: 4px 4px 0 #222, 8px 8px 12px rgba(0,0,0,.2);
    padding: 0 15px;
    letter-spacing: 2px;
}

.subtitle{
    text-align: center;
    color: white;
    font-size: 1.2rem;
    margin-bottom: 30px;
    text-shadow: 2px 2px 0 #222;
}

.container{
    width: 90%;
    max-width: 1100px;
    margin: auto;
}

.search{
    display: block;
    width: 100%;
    max-width: 600px;
    margin: 0 auto 35px auto;
    padding: 15px;
    border: none;
    border-radius: 15px;
    font-size: 18px;
    border: 4px solid #333;
    box-shadow: 0 5px 0 #333;
    outline: none;
    transition: 0.2s;
}

.search:focus {
    transform: translateY(2px);
    box-shadow: 0 3px 0 #333;
}

.podium{
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 15px;
    margin-bottom: 40px;
}

.podium-card{
    width: 180px;
    text-align: center;
    color: black;
    border: 4px solid #333;
    border-radius: 20px 20px 0 0;
    font-size: 22px;
    padding-top: 15px;
    box-shadow: 0 8px 0 #333;
}

.podium-name {
    font-family: 'Titan One', cursive;
    font-size: 26px;
    letter-spacing: 1px;
}

/* Link Styling for Podium */
a.podium-link {
    text-decoration: none;
    color: inherit;
    transition: 0.2s;
}

a.podium-link:hover .podium-name {
    text-decoration: underline;
}

.first{
    background: gold;
    height: 220px;
    order: 2; 
}

.second{
    background: silver;
    height: 180px;
    order: 1;
}

.third{
    background: #cd7f32;
    height: 150px;
    order: 3;
}

.leaderboard{
    background: white;
    border-radius: 20px;
    padding: 20px;
    border: 4px solid #333;
    box-shadow: 0 8px 0 #333;
}

/* Link styling for rows */
a.row {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 15px;
    border: 3px solid #333;
    background: #f5f5f5;
    transition: .2s;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
}

a.row:hover{
    transform: translateY(-3px) scale(1.01);
    box-shadow: 0 4px 0 #333;
}

.rank{
    width: 60px;
    font-size: 22px;
    font-weight: 900;
}

.name{
    width: 220px;
    font-family: 'Titan One', cursive;
    font-size: 22px;
    font-weight: normal;
    letter-spacing: 1px;
    padding-top: 3px;
}

.subs{
    width: 100px;
    text-align: right;
    font-weight: bold;
}

.bar-bg{
    flex: 1;
    height: 20px;
    border: 2px solid #333;
    border-radius: 10px;
    overflow: hidden;
    background: #eee;
}

.bar{
    height: 100%;
    background: #4ade80;
    transition: width 0.5s ease-out;
}

.fastyjay{
    background: #ffe066 !important;
    border: 4px solid #333;
    box-shadow: 0 0 15px gold;
}

@media (max-width: 768px) {
    .podium { flex-wrap: wrap; }
    .podium-card { width: 100px; font-size: 16px; }
    .podium-name { font-size: 18px; }
    .first { height: 180px; }
    .second { height: 140px; }
    .third { height: 120px; }
    a.row { flex-wrap: wrap; }
    .name { width: auto; flex: 1; }
    .bar-bg { width: 100%; flex: none; }
}
</style>
</head>
<body>

<img class="blook" src="https://ac.blooket.com/marketassets/blooks/chick.svg" alt="" aria-hidden="true" style="left:5%; width:80px; animation-duration:16s; animation-delay:-2s;">
<img class="blook" src="https://ac.blooket.com/marketassets/blooks/dragon.svg" alt="" aria-hidden="true" style="left:75%; width:100px; animation-duration:20s; animation-delay:-8s;">
<img class="blook" src="https://ac.blooket.com/marketassets/blooks/cow.svg" alt="" aria-hidden="true" style="left:45%; width:90px; animation-duration:18s; animation-delay:-12s;">
<img class="blook" src="https://ac.blooket.com/marketassets/blooks/dog.svg" alt="" aria-hidden="true" style="left:20%; width:70px; animation-duration:14s; animation-delay:-5s;">
<img class="blook" src="https://ac.blooket.com/marketassets/blooks/cat.svg" alt="" aria-hidden="true" style="left:85%; width:75px; animation-duration:17s; animation-delay:-1s;">
<img class="blook" src="https://ac.blooket.com/marketassets/blooks/pig.svg" alt="" aria-hidden="true" style="left:35%; width:85px; animation-duration:19s; animation-delay:-10s;">
<img class="blook" src="https://ac.blooket.com/marketassets/blooks/bear.svg" alt="" aria-hidden="true" style="left:60%; width:95px; animation-duration:15s; animation-delay:-14s;">
<img class="blook" src="https://ac.blooket.com/marketassets/blooks/penguin.svg" alt="" aria-hidden="true" style="left:12%; width:65px; animation-duration:13s; animation-delay:-7s;">
<img class="blook" src="https://ac.blooket.com/marketassets/blooks/frog.svg" alt="" aria-hidden="true" style="left:90%; width:80px; animation-duration:21s; animation-delay:-4s;">
<img class="blook" src="https://ac.blooket.com/marketassets/blooks/alien.svg" alt="" aria-hidden="true" style="left:50%; width:110px; animation-duration:22s; animation-delay:-18s;">
<img class="blook" src="https://ac.blooket.com/marketassets/blooks/unicorn.svg" alt="" aria-hidden="true" style="left:30%; width:90px; animation-duration:16s; animation-delay:-9s;">
<img class="blook" src="https://ac.blooket.com/marketassets/blooks/mouse.svg" alt="" aria-hidden="true" style="left:68%; width:60px; animation-duration:14s; animation-delay:-15s;">

<h1>Blooktuber Tracker</h1>
<div class="subtitle">Subscriber Counts Update Every Week!</div>

<div class="container">

    <input type="text" id="search" class="search" placeholder="Search Blooktubers...">

    <div class="podium">
        <div class="podium-card first">
            <a href="https://www.youtube.com/@WaymoreYT" target="_blank" class="podium-link">
                🥇<br><span class="podium-name">Waymore</span><br><br>150K
            </a>
        </div>
        <div class="podium-card second">
            <a href="https://www.youtube.com/@iBlooket" target="_blank" class="podium-link">
                🥈<br><span class="podium-name">iBlooket</span><br><br>35.2K
            </a>
        </div>
        <div class="podium-card third">
            <a href="https://www.youtube.com/@BILBRB" target="_blank" class="podium-link">
                🥉<br><span class="podium-name">BIL</span><br><br>31.2K
            </a>
        </div>
    </div>

    <div class="leaderboard" id="leaderboard"></div>

</div>

<script>
const rawData = [
    ["Waymore", 150000, "https://www.youtube.com/@WaymoreYT"],
    ["iBlooket", 35200, "https://www.youtube.com/@iBlooket"],
    ["BIL", 31200, "https://www.youtube.com/@BILBRB"],
    ["Blooket", 31100, "https://www.youtube.com/@PlayBlooket"],
    ["Mega Bot", 27100, "https://www.youtube.com/MATHBOARDOM"],
    ["Unblooked", 26800, "https://www.youtube.com/@unblooked"],
    ["Monkey Master", 24000, "https://www.youtube.com/@MonkeyMasterYT"],
    ["Lag0n", 23800, "https://www.youtube.com/channel/UCuiifqupfULUen105oNBUAw"],
    ["Blooket Ace", 15400, "https://www.youtube.com/@blooketace"],
    ["FastyJay", 12800, "https://www.youtube.com/@FastyJay"],
    ["Blooket Gamer", 6230, "https://www.youtube.com/@theblooketgamer"],
    ["Blooket Gods", 4600, "https://www.youtube.com/@BlooketGodsYT"],
    ["Slade2", 3690, "https://www.youtube.com/@theslade2"],
    ["Blooket Life", 3570, "https://www.youtube.com/@BlooketLifeYT"],
    ["JustaPanda", 2990, "https://www.youtube.com/@JustaPanda888"],
    ["Blooket Insane", 2980, "https://www.youtube.com/@blooketinsane"],
    ["notRIC", 2740, "https://www.youtube.com/@playblacket"],
    ["SRN Games", 2620, "https://www.youtube.com/@srngameslol"],
    ["BlooketBam", 2430, "https://www.youtube.com/@BlooketBAM"],
    ["Blook Master", 2100, "https://www.youtube.com/@BlookMasterYT"],
    ["Twisted Bread", 2060, "https://www.youtube.com/@TwistedBread/"],
    ["Pig55", 1520, "https://www.youtube.com/@Pig_55"],
    ["Blooket Elite", 1500, "https://www.youtube.com/@BlooketEliteIsEatingYourFries"],
    ["Turtelix", 1420, "https://www.youtube.com/@TurtelixYT"],
    ["Green astronaut", 1020, "https://www.youtube.com/@ThegreenastronautYT"],
    ["Blooket Warrior", 1020, "https://www.youtube.com/@BlooketWarriorYT"],
    ["Blookbread", 930, "https://www.youtube.com/@Breadblook"],
    ["YouLostMan", 653, "https://www.youtube.com/@YouLostMan"],
    ["Peetwick", 391, "https://www.youtube.com/@PeetWickYT"],
    ["Freedo", 138, "https://www.youtube.com/@TheRealFreedoBlox"],
    ["Blooket Galaxy", 65, "https://www.youtube.com/@BlooketGalaxy"],
    ["TheBlooketBro", 64, "https://www.youtube.com/@theblooketbro"],
    ["Cosmic Dragon", 62, "https://www.youtube.com/channel/UCGkvZdya3AgXj7nAf54lTBw"],
    ["XpBlooket32", 45, "https://www.youtube.com/@XPgamer32Blooket"],
    ["Blooket Gael", 39, "https://www.youtube.com/channel/UCOhGtij6ftod4pJ6mhU-skQ"]
];

const creators = rawData.map((creator, index) => {
    return {
        rank: index + 1,
        name: creator[0],
        subs: creator[1],
        url: creator[2]
    };
});

const maxSubs = creators[0].subs; 
const board = document.getElementById("leaderboard");

function formatSubs(num) {
    if (num >= 1000) return (num / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
    return num.toLocaleString();
}

function render(data) {
    board.innerHTML = "";

    if (data.length === 0) {
        board.innerHTML = "<div style='text-align:center; padding: 20px; font-size: 18px;'>No Blooktubers found! 😭</div>";
        return;
    }

    data.forEach(creator => {
        const percent = (creator.subs / maxSubs) * 100;
        
        const row = document.createElement("a");
        row.href = creator.url;
        row.target = "_blank"; 
        row.className = "row";
        
        if (creator.name.toLowerCase() === "fastyjay") {
            row.classList.add("fastyjay");
        }

        row.innerHTML = `
            <div class="rank">#${creator.rank}</div>
            <div class="name">${creator.name}</div>
            <div class="subs">${formatSubs(creator.subs)}</div>
            <div class="bar-bg">
                <div class="bar" style="width: ${percent}%"></div>
            </div>
        `;

        board.appendChild(row);
    });
}

render(creators);

document.getElementById("search").addEventListener("input", e => {
    const value = e.target.value.toLowerCase();
    
    const filteredData = creators.filter(c => 
        c.name.toLowerCase().includes(value)
    );
    
    render(filteredData);
});
</script>

</body>
</html>
